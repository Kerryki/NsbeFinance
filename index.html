<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NSBE Finance Portal</title>
<link href="https://unpkg.com/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" rel="stylesheet"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap');
  :root { --bg: #ffffff; --bg2: #f9fafb; --bg3: #f3f4f6; --surface: #e5f3f0; --accent: #10b981; --accent2: #059669; --text: #111827; --text2: #4b5563; --text3: #6b7280; --radius: 10px; --font: 'DM Sans', system-ui, sans-serif; --font-mono: 'DM Mono', monospace; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; }
  .app { display: flex; min-height: 100vh; }
  .sidebar { width: 220px; background: var(--bg2); border-right: 1px solid #e5e7eb; display: flex; flex-direction: column; }
  .main { flex: 1; overflow-y: auto; }
  .sidebar-header { padding: 20px; border-bottom: 1px solid #e5e7eb; }
  .logo { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; }
  .logo span { color: var(--accent); }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 28px; border-bottom: 1px solid #e5e7eb; position: sticky; top: 0; z-index: 10; }
  .page-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; }
  .content { padding: 24px 28px; }
  .nav { padding: 12px 10px; flex: 1; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 8px; cursor: pointer; color: var(--text2); font-size: 13px; transition: all 0.2s; width: 100%; background: none; border: none; text-align: left; font-family: var(--font); }
  .nav-item:hover { background: var(--bg3); }
  .nav-item.active { background: rgba(16,185,129,0.15); color: var(--accent); font-weight: 500; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 8px; border: 1px solid #e5e7eb; background: transparent; color: var(--text); cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; }
  .btn:hover { background: var(--bg3); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
  .btn-primary:hover { background: #059669; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .card { background: var(--bg2); border: 1px solid #e5e7eb; border-radius: 10px; padding: 18px 20px; margin-bottom: 14px; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--bg2); border: 1px solid #e5e7eb; border-radius: 10px; padding: 16px; }
  .stat-value { font-family: var(--font-mono); font-size: 22px; font-weight: 600; color: var(--text); }
  .line-card { background: var(--bg2); border: 1px solid #e5e7eb; border-radius: 10px; padding: 16px; margin-bottom: 12px; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: var(--bg2); border-radius: 10px; padding: 24px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
  .form-group { margin-bottom: 14px; }
  label { display: block; font-size: 11px; color: var(--text3); text-transform: uppercase; margin-bottom: 6px; }
  input, select, textarea { width: 100%; padding: 8px 12px; border: 1px solid #e5e7eb; border-radius: 8px; font-family: var(--font); font-size: 13px; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(16,185,129,0.1); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  #toast { position: fixed; bottom: 20px; right: 20px; background: var(--text); color: white; padding: 12px 16px; border-radius: 8px; opacity: 0; transition: opacity 0.3s; z-index: 1000; }
  #toast.show { opacity: 1; }
  .loading { position: fixed; inset: 0; background: rgba(255,255,255,0.8); display: flex; align-items: center; justify-content: center; z-index: 50; }
  .spinner { width: 40px; height: 40px; border: 3px solid #e5e7eb; border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 40px; color: var(--text2); }
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; background: rgba(16,185,129,0.15); color: #047857; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 11px; color: var(--text3); text-transform: uppercase; padding: 8px 12px; border-bottom: 1px solid #e5e7eb; }
  td { padding: 10px 12px; border-bottom: 1px solid #f3f4f6; }
</style>
</head>
<body>

<div id="root"></div>
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

const db = supabase.createClient(
  'https://zptyctzxjnyaxjonbgbp.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpwdHljdHp4am55YXhqb25iZ2JwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNTExMDMsImV4cCI6MjA5NDYyNzEwM30.-6pCdPHqHKjJBG4x3rpG-b01WdsfBOF_3Vscml_K6gY'
);

const PAGE_TITLES = { dashboard: 'Dashboard', lines: 'Budget Lines', transactions: 'Transactions', funds: 'Funds' };

async function dbGet() {
  const [y, l, t, f] = await Promise.all([
    db.from('years').select('*'),
    db.from('lines').select('*'),
    db.from('transactions').select('*'),
    db.from('funds').select('*'),
  ]);
  if (y.error) throw new Error(y.error.message);
  return { years: y.data, lines: l.data, transactions: t.data, funds: f.data };
}

async function dbCreate(table, data) {
  const { error } = await db.from(table).insert(data);
  if (error) throw new Error(error.message);
}

async function dbUpdate(table, id, data) {
  const { error } = await db.from(table).update(data).eq('id', id);
  if (error) throw new Error(error.message);
}

async function dbDelete(table, id) {
  const { error } = await db.from(table).delete().eq('id', id);
  if (error) throw new Error(error.message);
}

function fmt(n) { return '$' + parseFloat(n || 0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2600);
}

function App() {
  const [store, setStore] = useState(null);
  const [loading, setLoading] = useState(true);
  const [page, setPage] = useState('dashboard');
  const [modal, setModal] = useState(null);

  const activeYear = useMemo(() => store?.years?.find(y => y.id === store.activeYearId) ?? null, [store]);
  const totalAllocated = useMemo(() => (activeYear?.lines || []).filter(l => !l.isProfit).reduce((s,l) => s + Number(l.allocated||0), 0), [activeYear]);
  const totalSpent = useMemo(() => (activeYear?.transactions || []).filter(t => !t.fromProfit).reduce((s,t) => s + Number(t.amount||0), 0), [activeYear]);

  useEffect(() => {
    loadData();
  }, []);

  async function loadData() {
    try {
      setLoading(true);
      const data = await dbGet();
      const lines = data.lines || [];
      const transactions = data.transactions || [];
      const funds = data.funds || [];
      const years = data.years || [];
      const activeYearId = years[0]?.id || 1;

      setStore({
        years: years.map(y => ({
          ...y,
          lines: lines.filter(l => l.yearId === y.id),
          transactions: transactions.filter(t => t.yearId === y.id),
          funds: funds.filter(f => f.yearId === y.id)
        })),
        activeYearId
      });
    } catch (err) {
      console.error('Load error:', err);
      showToast('Failed to load data. Please try again.');
    } finally {
      setLoading(false);
    }
  }

  if (!store || loading) {
    return React.createElement('div', { className: 'loading' }, React.createElement('div', { className: 'spinner' }));
  }

  return React.createElement('div', { className: 'app' },
    React.createElement('div', { className: 'sidebar' },
      React.createElement('div', { className: 'sidebar-header' },
        React.createElement('div', { className: 'logo' }, 'NSBE ', React.createElement('span', null, 'Finance')),
        React.createElement('div', { style: { fontSize: 11, color: 'var(--text3)', marginTop: 4 } }, 'Portal')
      ),
      React.createElement('nav', { 'aria-label': 'Main navigation', className: 'nav' },
        React.createElement('button', { className: `nav-item ${page === 'dashboard' ? 'active' : ''}`, onClick: () => setPage('dashboard'), 'aria-current': page === 'dashboard' ? 'page' : undefined }, React.createElement('i',{className:'ti ti-layout-dashboard', 'aria-hidden': 'true'}), 'Dashboard'),
        React.createElement('button', { className: `nav-item ${page === 'lines' ? 'active' : ''}`, onClick: () => setPage('lines'), 'aria-current': page === 'lines' ? 'page' : undefined }, React.createElement('i',{className:'ti ti-list-check', 'aria-hidden': 'true'}), 'Budget Lines'),
        React.createElement('button', { className: `nav-item ${page === 'transactions' ? 'active' : ''}`, onClick: () => setPage('transactions'), 'aria-current': page === 'transactions' ? 'page' : undefined }, React.createElement('i',{className:'ti ti-receipt', 'aria-hidden': 'true'}), 'Transactions'),
        React.createElement('button', { className: `nav-item ${page === 'funds' ? 'active' : ''}`, onClick: () => setPage('funds'), 'aria-current': page === 'funds' ? 'page' : undefined }, React.createElement('i',{className:'ti ti-file-dollar', 'aria-hidden': 'true'}), 'Funds')
      )
    ),
    React.createElement('div', { className: 'main' },
      React.createElement('div', { className: 'topbar' },
        React.createElement('div', { className: 'page-title' }, PAGE_TITLES[page])
      ),
      React.createElement('div', { className: 'content' },
        page === 'dashboard' && React.createElement('div', null,
          React.createElement('div', { className: 'stats-grid' },
            React.createElement('div', { className: 'stat-card' }, React.createElement('div', { style: { fontSize: 11, color: 'var(--text3)' } }, 'ECA Allocated'), React.createElement('div', { className: 'stat-value' }, fmt(totalAllocated))),
            React.createElement('div', { className: 'stat-card' }, React.createElement('div', { style: { fontSize: 11, color: 'var(--text3)' } }, 'Spent'), React.createElement('div', { className: 'stat-value' }, fmt(totalSpent))),
            React.createElement('div', { className: 'stat-card' }, React.createElement('div', { style: { fontSize: 11, color: 'var(--text3)' } }, 'Remaining'), React.createElement('div', { className: 'stat-value' }, fmt(totalAllocated - totalSpent)))
          ),
          React.createElement('div', { className: 'card' },
            React.createElement('p', null, 'Finance portal is connected to Supabase.')
          )
        ),
        page === 'lines' && React.createElement('div', null, React.createElement('p', null, 'Budget Lines')),
        page === 'transactions' && React.createElement('div', null, React.createElement('p', null, 'Transactions')),
        page === 'funds' && React.createElement('div', null, React.createElement('p', null, 'Funds'))
      )
    )
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>

</body>
</html>
