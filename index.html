// ── UTILS ──────────────────────────────────────────────────────────────────────
function fmt(n) {
  return '$' + parseFloat(n || 0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2600);
}

function downloadCSV(filename, rows) {
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

    (activeYear?.lines || []).filter(l => !l.isProfit).reduce((s, l) => s + Number(l.allocated || 0), 0),
    [activeYear]);

  const totalSpent = useMemo(() =>
    (activeYear?.transactions || []).filter(t => !t.fromProfit).reduce((s, t) => s + Number(t.amount || 0), 0),
    [activeYear]);

  const totalProfit = useMemo(() => {
    const base = (activeYear?.lines || []).filter(l => l.isProfit).reduce((s, l) => s + Number(l.allocated || 0), 0);
    const fundIncome = (activeYear?.funds || []).filter(f => f.status === 'approved' && f.allocateTo === 'profit').reduce((s, f) => s + Number(f.received || 0), 0);
    const draws = (activeYear?.transactions || []).filter(t => t.fromProfit).reduce((s, t) => s + Number(t.amount || 0), 0);
    return base + fundIncome - draws;
  }, [activeYear]);

  const totalLineSpent = useCallback((lineId) =>
    (activeYear?.transactions || []).filter(t => String(t.lineId) === String(lineId) && !t.fromProfit).reduce((s, t) => s + Number(t.amount || 0), 0),
    [activeYear]);

  const lineById = useCallback((id) =>
    (activeYear?.lines || []).find(l => String(l.id) === String(id)),
    [activeYear]);

  const filteredTx = useMemo(() => {
    let txs = activeYear?.transactions || [];
    if (filter.line !== 'all') txs = txs.filter(t => String(t.lineId) === String(filter.line));
    if (filter.search) {
      const q = filter.search.toLowerCase();
      txs = txs.filter(t =>
        (t.name || '').toLowerCase().includes(q) ||
        (t.description || '').toLowerCase().includes(q) ||
        (lineById(t.lineId)?.name || '').toLowerCase().includes(q)
      );
    }
    return txs.slice().sort((a, b) => new Date(b.date) - new Date(a.date));
  }, [activeYear, filter, lineById]);

  async function loadData() {
    try {
      setLoading(true);
      const [y, l, t, f] = await Promise.all([
        db.from('years').select('*'),
        db.from('lines').select('*'),
        db.from('transactions').select('*'),
        db.from('funds').select('*'),
      ]);
      if (y.error) throw new Error(y.error.message);

      const years = y.data || [];
      if (years.length === 0) {
        const seedErr = await seedData();
        if (seedErr) { showToast('Failed to initialize data — check console'); setLoading(false); return; }
        return loadData();
      }

      const lines = l.data || [];
      const transactions = t.data || [];
      const funds = f.data || [];
      const savedId = localStorage.getItem('nsbe_activeYearId');
      const activeYearId = (savedId && years.find(yr => yr.id === savedId)) ? savedId : years[0].id;

      setStore({
        activeYearId,
        years: years.map(yr => ({
          ...yr,
          lines: lines.filter(li => li.yearId === yr.id),
          transactions: transactions.filter(tx => tx.yearId === yr.id),
          funds: funds.filter(fu => fu.yearId === yr.id),
        })),
      });
    } catch (err) {
      showToast('Failed to load data — check console');
      console.error(err);
    } finally {
      setLoading(false);
    }
  }

  async function seedData() {
    const { error: e1 } = await db.from('years').insert(SEED_YEAR);
    const { error: e2 } = await db.from('lines').insert(SEED_LINES);
    const { error: e3 } = await db.from('transactions').insert(SEED_TRANSACTIONS);
    return e1 || e2 || e3 || null;
  }

  // ── LINE CRUD ──
  async function addLine(data) {
    const newLine = {
      id: String(Date.now()),
      yearId: activeYear.id,
      code: data.code,
      name: data.name,
      allocated: parseFloat(data.allocated),
      description: data.description || '',
      isProfit: data.isProfit || false,
    };
    const { error } = await db.from('lines').insert(newLine);
    if (error) { showToast('Error saving line'); return; }
    setStore(s => ({
      ...s,
      years: s.years.map(y => y.id === s.activeYearId ? { ...y, lines: [...y.lines, newLine] } : y),
    }));
    showToast('Budget line added');
  }

  async function editLine(data) {
    const patch = {
      code: data.code,
      name: data.name,
      allocated: parseFloat(data.allocated),
      description: data.description || '',
      isProfit: data.isProfit || false,
    };
    const { error } = await db.from('lines').update(patch).eq('id', data.id);
    if (error) { showToast('Error updating line'); return; }
    setStore(s => ({
      ...s,
      years: s.years.map(y => y.id === s.activeYearId
        ? { ...y, lines: y.lines.map(l => l.id === data.id ? { ...l, ...patch } : l) }
        : y),
    }));
    showToast('Line updated');
  }

  async function deleteLine(id) {
    const { error: e1 } = await db.from('transactions').delete().eq('lineId', id);
    const { error: e2 } = await db.from('lines').delete().eq('id', id);
    if (e1 || e2) { showToast('Error removing line'); return; }
    setStore(s => ({
      ...s,
      years: s.years.map(y => y.id === s.activeYearId
        ? { ...y, lines: y.lines.filter(l => l.id !== id), transactions: y.transactions.filter(t => t.lineId !== id) }
        : y),
    }));
    showToast('Line removed');
  }

  // ── TRANSACTION CRUD ──
  async function addTransaction(data) {
    const line = lineById(data.lineId);
    const spent = totalLineSpent(data.lineId);
    const allocated = Number(line?.allocated || 0);
    const amount = Number(data.amount);
    const over = spent + amount - allocated;

    if (over > 0 && !line?.isProfit) {
      if (totalProfit < over) {
        showToast('Not enough in profit pool to cover overage!');
        return;
      }
      const tx1 = { id: String(Date.now()),     yearId: activeYear.id, lineId: data.lineId, date: data.date, amount: parseFloat(data.amount), name: data.name, description: data.description, fromProfit: false };
      const tx2 = { id: String(Date.now() + 1), yearId: activeYear.id, lineId: data.lineId, date: data.date, amount: over,                   name: data.name, description: `Profit draw for: ${data.description}`, fromProfit: true };
      const { error: e1 } = await db.from('transactions').insert(tx1);
      const { error: e2 } = await db.from('transactions').insert(tx2);
      if (e1 || e2) { showToast('Error recording transaction'); return; }
      setStore(s => ({
        ...s,
        years: s.years.map(y => y.id === s.activeYearId ? { ...y, transactions: [...y.transactions, tx1, tx2] } : y),
      }));
      showToast(`Over budget — $${over.toFixed(2)} drawn from profit`);
      return;
    }

    const tx = { id: String(Date.now()), yearId: activeYear.id, lineId: data.lineId, date: data.date, amount: parseFloat(data.amount), name: data.name, description: data.description, fromProfit: false };
    const { error } = await db.from('transactions').insert(tx);
    if (error) { showToast('Error recording transaction'); return; }
    setStore(s => ({
      ...s,
      years: s.years.map(y => y.id === s.activeYearId ? { ...y, transactions: [...y.transactions, tx] } : y),
    }));
    showToast('Transaction recorded');
  }

  async function deleteTransaction(id) {
    const { error } = await db.from('transactions').delete().eq('id', id);
    if (error) { showToast('Error removing transaction'); return; }
    setStore(s => ({
      ...s,
      years: s.years.map(y => y.id === s.activeYearId
        ? { ...y, transactions: y.transactions.filter(t => t.id !== id) }
        : y),
    }));
    showToast('Transaction removed');
  }

  // ── FUND CRUD ──
  async function addFund(data) {
    const fund = {
      id: String(Date.now()),
      yearId: activeYear.id,
      name: data.name,
      requested: parseFloat(data.requested),
      received: data.received ? parseFloat(data.received) : null,
      notes: data.notes || '',
      allocateTo: data.allocateTo || 'profit',
      status: 'pending',
    };
    const { error } = await db.from('funds').insert(fund);
    if (error) { showToast('Error saving fund'); return; }
    setStore(s => ({
      ...s,
      years: s.years.map(y => y.id === s.activeYearId ? { ...y, funds: [...y.funds, fund] } : y),
    }));
    showToast('Fund application added');
  }

  async function updateFund(id, patch) {
    const { error } = await db.from('funds').update(patch).eq('id', id);
    if (error) { showToast('Error updating fund'); return; }
    setStore(s => ({
      ...s,
      years: s.years.map(y => y.id === s.activeYearId
        ? { ...y, funds: y.funds.map(f => f.id === id ? { ...f, ...patch } : f) }
        : y),
    }));
    showToast('Fund updated');
  }

  async function deleteFund(id) {
    const { error } = await db.from('funds').delete().eq('id', id);
    if (error) { showToast('Error removing fund'); return; }
    setStore(s => ({
      ...s,
      years: s.years.map(y => y.id === s.activeYearId
        ? { ...y, funds: y.funds.filter(f => f.id !== id) }
        : y),
    }));
    showToast('Fund removed');
  }

  // ── NEW YEAR ──
  async function startNewYear(label) {
    const base = (activeYear.lines || []).filter(l => l.isProfit).reduce((s, l) => s + Number(l.allocated || 0), 0);
    const fundIncome = (activeYear.funds || []).filter(f => f.status === 'approved').reduce((s, f) => s + Number(f.received || 0), 0);
    const draws = (activeYear.transactions || []).filter(t => t.fromProfit).reduce((s, t) => s + Number(t.amount || 0), 0);
    const profitCarryover = Math.max(0, base + fundIncome - draws);

    const ts = Date.now();
    const newYearId = 'y' + ts;
    const newYear = { id: newYearId, label, locked: false };
    const profitLineId = 'l' + (ts + 1);
    const profitLine = {
      id: profitLineId,
      yearId: newYearId,
      code: 'NEW-01',
      name: 'Profit',
      allocated: profitCarryover,
      description: 'Revenue & Sponsorships',
      isProfit: true,
    };

    const { error: e1 } = await db.from('years').update({ locked: true }).eq('id', activeYear.id);
    const { error: e2 } = await db.from('years').insert(newYear);
    const { error: e3 } = await db.from('lines').insert(profitLine);
    if (e1 || e2 || e3) { showToast('Error starting new year'); return; }

    const newYearFull = { ...newYear, lines: [profitLine], transactions: [], funds: [] };
    setStore(s => ({
      activeYearId: newYearId,
      years: s.years.map(y => y.id === s.activeYearId ? { ...y, locked: true } : y).concat([newYearFull]),
    }));
    localStorage.setItem('nsbe_activeYearId', newYearId);
    showToast(`New year "${label}" started! Profit carried over: ${fmt(profitCarryover)}`);
  }

  // ── IMPORT LINES ──
  async function importLines(text) {
    const textLines = text.trim().split('\n').filter(l => l.trim());
    const newLines = [];
    textLines.forEach((line, i) => {
      const parts = line.split('\t').map(p => p.trim());
      if (parts.length >= 2) {
        const code = parts[0] || '';
        const name = parts[1] || '';
        const allocated = parseFloat(parts[2] || '0') || 0;
        if (name && !activeYear.lines.find(l => l.code === code)) {
          newLines.push({ id: String(Date.now() + i), yearId: activeYear.id, code, name, allocated, description: '', isProfit: false });
        }
      }
    });
    if (newLines.length === 0) { showToast('No new lines to import'); return; }
    const { error } = await db.from('lines').insert(newLines);
    if (error) { showToast('Error importing lines'); return; }
    setStore(s => ({
      ...s,
      years: s.years.map(y => y.id === s.activeYearId ? { ...y, lines: [...y.lines, ...newLines] } : y),
    }));
    showToast(`Imported ${newLines.length} budget line(s)`);
  }

  // ── EXPORT ──
  function exportTransactions() {
    const rows = [['Date', 'Code', 'Line Name', 'Person', 'Description', 'Amount', 'Type']];
    (activeYear?.transactions || []).forEach(t => {
      const line = lineById(t.lineId);
      rows.push([t.date, line?.code || '', line?.name || '', t.name, t.description, '$' + Number(t.amount).toFixed(2), t.fromProfit ? 'Profit Draw' : 'Expense']);
    });
    downloadCSV(`NSBE_Transactions_${(activeYear?.label || 'export').replace(/\s/g, '_')}.csv`, rows);
    showToast('Exported transactions');
  }

  if (loading || !store) {
    return React.createElement('div', { className: 'loading' },
      React.createElement('div', { className: 'spinner' })
    );
  }

  if (!role) return React.createElement(Login, { onLogin: setRole });

  return React.createElement('div', { className: 'app' },
    // SIDEBAR
    React.createElement('aside', { className: 'sidebar' },
      React.createElement('div', { className: 'sidebar-header' },
        React.createElement('div', { className: 'logo' }, 'NSBE', React.createElement('span', null, ' ∞')),
        React.createElement('div', { className: 'logo-sub' }, 'Finance Portal'),
        React.createElement('div', { className: 'year-badge' },
          React.createElement('i', { className: 'ti ti-calendar', style: { fontSize: 12 } }),
          activeYear?.label || ''
        )
      ),
      React.createElement('nav', { className: 'nav' },
        React.createElement('div', { className: 'nav-section' }, 'Overview'),
        navItem('dashboard',    'ti-layout-dashboard', 'Dashboard',        page, setPage),
        navItem('lines',        'ti-list',             'Budget Lines',      page, setPage),
        navItem('transactions', 'ti-receipt',          'Transactions',      page, setPage),
        React.createElement('div', { className: 'nav-section' }, 'Funding'),
        navItem('funds',        'ti-file-dollar',      'Fund Applications', page, setPage),
        React.createElement('div', { className: 'nav-section' }, 'History'),
        navItem('archive',      'ti-archive',          'Past Years',        page, setPage),
      ),
      React.createElement('div', { className: 'sidebar-footer' },
        React.createElement('div', { className: 'role-pill' },
          React.createElement('div', { className: 'role-dot' }),
          React.createElement('div', null,
            React.createElement('div', { className: 'role-label' }, 'Signed in as'),
            React.createElement('div', { className: 'role-name' }, isAdmin ? 'VP Finance / President' : 'Public Viewer')
          )
        ),
        isAdmin && React.createElement('button', {
          className: 'btn btn-ghost btn-sm',
          style: { width: '100%', marginTop: 8, justifyContent: 'center' },
          onClick: () => { setRole(null); setPage('dashboard'); }
        }, React.createElement('i', { className: 'ti ti-logout' }), 'Sign out')
      )
    ),
    // MAIN
    React.createElement('div', { className: 'main' },
      page === 'dashboard'    && React.createElement(Dashboard,        { year: activeYear, totalAllocated, totalSpent, totalProfit, isAdmin, onNewYear: () => setModal('newYear'), setPage }),
      page === 'lines'        && React.createElement(LinesPage,        { year: activeYear, isAdmin, totalLineSpent, addLine, editLine, deleteLine, modal, setM: setModal, onImport: importLines, setPage, setFilter }),
      page === 'transactions' && React.createElement(TransactionsPage, { year: activeYear, isAdmin, filter, setFilter, filteredTx, lineById, addTransaction, deleteTransaction, modal, setModal, totalLineSpent, onExport: exportTransactions }),
      page === 'funds'        && React.createElement(FundsPage,        { year: activeYear, isAdmin, addFund, updateFund, deleteFund, addLine, modal, setModal }),
      page === 'archive'      && React.createElement(ArchivePage,      { store, archiveYear, setArchiveYear, setActiveYear: id => { localStorage.setItem('nsbe_activeYearId', id); setStore(s => ({ ...s, activeYearId: id })); setPage('dashboard'); } }),
    ),
    modal === 'newYear' && React.createElement(NewYearModal, { onClose: () => setModal(null), onStart: startNewYear }),
  );
}

function navItem(id, icon, label, page, setPage) {
  return React.createElement('div', { key: id, className: 'nav-item' + (page === id ? ' active' : ''), onClick: () => setPage(id) },
    React.createElement('i', { className: `ti ${icon}` }), label
  );
}

// ── LOGIN ──────────────────────────────────────────────────────────────────────
function Login({ onLogin }) {
  const [tab, setTab] = useState('public');
  const [pw, setPw] = useState('');
  const [err, setErr] = useState('');
  const ADMIN_PW = 'nsbe2025';

  function tryLogin() {
    if (tab === 'public') { onLogin('public'); return; }
    if (pw === ADMIN_PW) { onLogin('admin'); }
    else { setErr('Incorrect password'); }
  }

  return React.createElement('div', { className: 'login-wrap' },
    React.createElement('div', { className: 'login-box' },
      React.createElement('div', { className: 'login-logo' }, 'NSBE', React.createElement('span', null, ' ∞')),
      React.createElement('div', { className: 'login-sub' }, 'Chapter Finance Portal'),
      React.createElement('div', { className: 'tabs' },
        React.createElement('div', { className: 'tab' + (tab === 'public' ? ' active' : ''), onClick: () => { setTab('public'); setErr(''); } }, 'View Only'),
        React.createElement('div', { className: 'tab' + (tab === 'admin'  ? ' active' : ''), onClick: () => { setTab('admin');  setErr(''); } }, 'Admin Access'),
      ),
      tab === 'public' && React.createElement('div', { className: 'info-box' },
        React.createElement('i', { className: 'ti ti-eye' }),
        'Public access lets you view all finances without making changes.'
      ),
      tab === 'admin' && React.createElement('div', { className: 'form-group' },
        React.createElement('label', null, 'Admin Password'),
        React.createElement('input', { type: 'password', value: pw, onChange: e => { setPw(e.target.value); setErr(''); }, onKeyDown: e => e.key === 'Enter' && tryLogin(), placeholder: 'Enter password...' }),
        err && React.createElement('div', { style: { color: '#dc2626', fontSize: 12, marginTop: 6 } }, err)
      ),
      tab === 'admin' && React.createElement('div', { style: { fontSize: 11, color: 'var(--text3)', marginBottom: 14 } },
        '(default password: nsbe2025 — change in code before deploying)'
      ),
      React.createElement('button', { className: 'btn btn-primary', style: { width: '100%', justifyContent: 'center' }, onClick: tryLogin },
        tab === 'public' ? 'View Finances' : 'Sign In'
      )
    )
  );
}

// ── LINES PAGE ─────────────────────────────────────────────────────────────────
function LinesPage({ year, isAdmin, totalLineSpent, addLine, editLine, deleteLine, modal, setM, onImport, setPage, setFilter }) {

  const [importText, setImportText] = useState('');
  const lines = year?.lines || [];

  const goToTransactions = (lineId) => {
    setFilter({ line: String(lineId), search: '' });
    setPage('transactions');
  };

  return React.createElement('div', null,
    React.createElement('div', { className: 'topbar' },
      React.createElement('div', { className: 'page-title' }, 'Budget Lines'),
      isAdmin && React.createElement('div', { className: 'topbar-actions' },
        React.createElement('button', { className: 'btn btn-primary', onClick: () => { setEditTarget(null); setM('addLine'); } },
          React.createElement('i', { className: 'ti ti-plus' }), 'Add Line'
        ),
        React.createElement('button', { className: 'btn btn-ghost', onClick: () => setM('import') },
          React.createElement('i', { className: 'ti ti-download' }), 'Import'
        ),
      )
    ),
    React.createElement('div', { className: 'content' },

  const [label, setLabel] = useState('2026 – 2027');
  return React.createElement('div', { className: 'modal-overlay', onClick: e => e.target === e.currentTarget && onClose() },
    React.createElement('div', { className: 'modal' },
      React.createElement('div', { className: 'modal-title' }, 'Start New Executive Year',
        React.createElement('button', { className: 'btn btn-ghost btn-sm', onClick: onClose }, React.createElement('i', { className: 'ti ti-x' }))
      ),
      React.createElement('div', { className: 'info-box' },
        React.createElement('i', { className: 'ti ti-archive' }),
        "The current year will be saved as a read-only archive. You'll start fresh with a blank slate."
      ),
      React.createElement('div', { className: 'form-group' },
        React.createElement('label', null, 'Year Label'),
        React.createElement('input', { value: label, onChange: e => setLabel(e.target.value), placeholder: 'e.g. 2026 – 2027' })
      ),
      React.createElement('div', { className: 'form-actions' },
        React.createElement('button', { className: 'btn', onClick: onClose }, 'Cancel'),
        React.createElement('button', { className: 'btn btn-gold', onClick: () => { if (!label) { showToast('Enter a label'); return; } onStart(label); onClose(); } },
          React.createElement('i', { className: 'ti ti-calendar-plus' }), 'Archive & Start New Year'
        )
      )
    )
  );
}

// ── MOUNT ──────────────────────────────────────────────────────────────────────

root.render(React.createElement(App));
